<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="Ilustrácia: ostrov obvodu mimo hlavnej plochy">
  <rect width="400" height="280" fill="#f8fafc"/>
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="0" y1="70" x2="400" y2="70"/>
    <line x1="0" y1="140" x2="400" y2="140"/>
    <line x1="0" y1="210" x2="400" y2="210"/>
    <line x1="100" y1="0" x2="100" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
  </g>
  <!-- neighbour district (gray, for context) -->
  <polygon points="200,30 380,30 380,250 200,250" fill="#94a3b8" fill-opacity="0.12" stroke="#64748b" stroke-width="2"/>
  <!-- main body of district (purple) -->
  <polygon points="20,30 180,30 180,180 20,180" fill="#a855f7" fill-opacity="0.20" stroke="#9333ea" stroke-width="3"/>
  <!-- island fragment — same purple but dashed red border = anomaly -->
  <polygon points="280,200 360,200 360,250 280,250" fill="#a855f7" fill-opacity="0.20" stroke="#dc2626" stroke-width="3" stroke-dasharray="6 4"/>
  <!-- arrow connecting main body to island -->
  <g stroke="#dc2626" stroke-width="1.5" fill="none" stroke-dasharray="3 3">
    <path d="M 160 150 Q 220 220 280 225"/>
  </g>
  <!-- school marker for main body -->
  <g font-family="sans-serif">
    <rect x="80" y="90" width="14" height="14" fill="#581c87" rx="2"/>
    <text x="87" y="101" fill="#fff" font-size="9" text-anchor="middle" font-weight="700">D</text>
  </g>
  <!-- house dots in island -->
  <circle cx="300" cy="220" r="4" fill="#9333ea"/>
  <circle cx="330" cy="215" r="4" fill="#9333ea"/>
  <circle cx="320" cy="238" r="4" fill="#9333ea"/>
  <!-- anomaly label -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="282" y="174" width="80" height="22" fill="#ffffff" stroke="#dc2626" stroke-width="1.5" rx="3"/>
    <text x="322" y="189" font-size="10" font-weight="700" fill="#991b1b" text-anchor="middle">OSTROV</text>
  </g>
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="252" width="400" height="28" fill="#ffffff"/>
    <text x="12" y="270" font-size="11" fill="#0f172a" font-weight="600">Ostrov — fragment obvodu odtrhnutý od hlavnej plochy</text>
  </g>
</svg>
