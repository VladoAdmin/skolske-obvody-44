<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="Ilustrácia: správny obvod">
  <rect width="400" height="280" fill="#f8fafc"/>
  <!-- street grid -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="0" y1="70" x2="400" y2="70"/>
    <line x1="0" y1="140" x2="400" y2="140"/>
    <line x1="0" y1="210" x2="400" y2="210"/>
    <line x1="100" y1="0" x2="100" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
  </g>
  <!-- district A (blue, top-left) -->
  <polygon points="20,30 200,30 200,140 20,140" fill="#3b82f6" fill-opacity="0.18" stroke="#2563eb" stroke-width="3"/>
  <!-- district B (orange, right) -->
  <polygon points="200,30 380,30 380,250 200,250" fill="#f97316" fill-opacity="0.18" stroke="#ea580c" stroke-width="3"/>
  <!-- district C (green, bottom-left) -->
  <polygon points="20,140 200,140 200,250 20,250" fill="#10b981" fill-opacity="0.18" stroke="#059669" stroke-width="3"/>
  <!-- house dots colored by district -->
  <g>
    <circle cx="60" cy="60" r="4" fill="#2563eb"/>
    <circle cx="120" cy="60" r="4" fill="#2563eb"/>
    <circle cx="160" cy="100" r="4" fill="#2563eb"/>
    <circle cx="80" cy="110" r="4" fill="#2563eb"/>
    <circle cx="240" cy="80" r="4" fill="#ea580c"/>
    <circle cx="320" cy="60" r="4" fill="#ea580c"/>
    <circle cx="350" cy="180" r="4" fill="#ea580c"/>
    <circle cx="270" cy="220" r="4" fill="#ea580c"/>
    <circle cx="80" cy="180" r="4" fill="#059669"/>
    <circle cx="140" cy="220" r="4" fill="#059669"/>
    <circle cx="60" cy="230" r="4" fill="#059669"/>
  </g>
  <!-- school markers -->
  <g>
    <rect x="100" y="80" width="14" height="14" fill="#1e3a8a" rx="2"/>
    <text x="107" y="91" fill="#fff" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="700">A</text>
    <rect x="290" y="130" width="14" height="14" fill="#9a3412" rx="2"/>
    <text x="297" y="141" fill="#fff" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="700">B</text>
    <rect x="100" y="185" width="14" height="14" fill="#065f46" rx="2"/>
    <text x="107" y="196" fill="#fff" font-family="sans-serif" font-size="9" text-anchor="middle" font-weight="700">C</text>
  </g>
  <!-- caption -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="252" width="400" height="28" fill="#ffffff"/>
    <text x="12" y="270" font-size="11" fill="#0f172a" font-weight="600">Čistý obvod — žiadne prekryvy ani ostrovy</text>
  </g>
</svg>
